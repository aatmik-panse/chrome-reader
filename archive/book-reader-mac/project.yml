name: book-reader-mac
options:
  deploymentTarget:
    macOS: "14.4"
  bundleIdPrefix: com.profitoniumapps.instantbookreader
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.4"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    # The WebReader pre-build phase shells out to npm/node which need to
    # read files outside the standard build sandbox (the extension's
    # node_modules + dist + package-lock.json). Xcode 15+ enables script
    # sandboxing by default and denies those reads, surfacing as
    # `Sandbox: bash(...) deny(1) file-read-data ...`. Disable sandboxing
    # for this target's run-script phases.
    ENABLE_USER_SCRIPT_SANDBOXING: NO

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.19
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  InstantBookReader:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Core
      - path: Persistence
      - path: Windows
      - path: Hotkey
      - path: System
      - path: Placeholders
      - path: Ambient
      - path: Library
      - path: Reader
      - path: AI
      - path: Settings
      - path: PageMode
      - path: Resources
      - path: Intents
      - path: Accessibility
      - path: Update
    resources:
      - path: Resources/WebReader.bundle
        optional: true
      - path: PageMode/Resources
        buildPhase: resources
    preBuildScripts:
      - name: Build WebReader bundle from extension dist
        script: |
          set -euo pipefail
          # Xcode launches build scripts with a minimal PATH (no Homebrew,
          # no nvm). Augment it so `node`/`npm` resolve in the GUI build.
          export PATH="/opt/homebrew/bin:/usr/local/bin:$HOME/.nvm/versions/node/$(ls -1 $HOME/.nvm/versions/node 2>/dev/null | tail -1)/bin:$PATH"
          EXT_DIR="${SRCROOT}/../book-reader-extension"
          if [ ! -d "$EXT_DIR" ]; then
            EXT_DIR="/Users/profitoniumapps/Documents/chromeApps/book-reader-extension"
          fi
          DEST="${SRCROOT}/Resources/WebReader.bundle"
          if [ ! -d "$EXT_DIR" ]; then
            echo "error: book-reader-extension directory not found at $EXT_DIR"
            exit 1
          fi
          # If node isn't on PATH (e.g. fresh dev box without Homebrew),
          # fall back to an existing dist/ if one is present, otherwise
          # fail with a clear message.
          if ! command -v npm >/dev/null 2>&1; then
            if [ -f "$EXT_DIR/dist/src/newtab/index.html" ]; then
              echo "warning: npm not on PATH; reusing existing $EXT_DIR/dist"
            else
              echo "error: npm not found on PATH and no pre-built dist/ available."
              echo "Install Node.js (brew install node) or build the extension"
              echo "once from a terminal: cd $EXT_DIR && npm install && npm run build"
              exit 1
            fi
          else
            pushd "$EXT_DIR" >/dev/null
            if [ ! -d node_modules ]; then
              npm install --no-audit --no-fund
            fi
            npm run build
            popd >/dev/null
          fi
          rm -rf "$DEST"
          mkdir -p "$DEST"
          cp -R "$EXT_DIR/dist/." "$DEST/"
        inputFiles:
          - $(SRCROOT)/../book-reader-extension/src
          - $(SRCROOT)/../book-reader-extension/package.json
        outputFiles:
          - $(SRCROOT)/Resources/WebReader.bundle/index.html
        basedOnDependencyAnalysis: false
    dependencies:
      - package: KeyboardShortcuts
      - package: ZIPFoundation
      - package: Sparkle
    info:
      path: App/Info.plist
      properties:
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "© 2026 Profitonium Apps"
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        SUFeedURL: https://updates.instantbookreader.app/appcast.xml
        SUPublicEDKey: REPLACE_WITH_EDDSA_PUBLIC_KEY_AFTER_KEYGEN
        SUEnableInstallerLauncherService: true
        NSAppleEventsUsageDescription: "Instant Book Reader uses Apple Events for the Reveal in Finder action."
        CFBundleDocumentTypes:
          - CFBundleTypeName: "EPUB Book"
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - org.idpf.epub-container
          - CFBundleTypeName: "PDF Document"
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.adobe.pdf
          - CFBundleTypeName: "Plain Text"
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.profitoniumapps.instantbookreader
        INFOPLIST_FILE: App/Info.plist
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  InstantBookReaderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - "Fixtures/**"
          - "PageMode/Fixtures/**"
          - "PageMode/_generate_reference.swift.txt"
      - path: Tests/Fixtures
        buildPhase: resources
      - path: Tests/PageMode/Fixtures
        buildPhase: resources
    dependencies:
      - target: InstantBookReader
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/InstantBookReader.app/Contents/MacOS/InstantBookReader
